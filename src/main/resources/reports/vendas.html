<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Vendas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .relatorio {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="relatorio">
        <h1>Relatório de Vendas - Outubro 2024</h1>
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Quantidade Vendida</th>
                    <th>Preço Unitário</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Produto A</td>
                    <td>150</td>
                    <td>R$ 20,00</td>
                    <td>R$ 3.000,00</td>
                </tr>
                <tr>
                    <td>Produto B</td>
                    <td>120</td>
                    <td>R$ 15,00</td>
                    <td>R$ 1.800,00</td>
                </tr>
                <tr>
                    <td>Produto C</td>
                    <td>200</td>
                    <td>R$ 10,00</td>
                    <td>R$ 2.000,00</td>
                </tr>
            </tbody>
        </table>
        <div class="footer">
            Relatório gerado automaticamente pelo sistema.
        </div>
    </div>
</body>
</html>

name: Build and Test for Java 21

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64, x86]
    steps:
      # Configurar o JDK e o Maven
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          architecture: ${{ matrix.arch }}
          distribution: 'temurin'

      - name: Checkout repository
        uses: actions/checkout@v3

      # Configurar o Maven
      - name: Set up Maven
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
          architecture: ${{ matrix.arch }}
          cache: maven

      # Compilar e testar o projeto com Maven
      - name: Build with Maven
        run: mvn clean install

      - name: Run Tests
        run: mvn test
